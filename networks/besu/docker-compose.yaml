services:
  besu:
    image: hyperledger/besu:latest
    container_name: besu-node
    restart: unless-stopped
    ports:
      - "8545:8545"   # HTTP JSON-RPC
      - "8546:8546"   # WebSocket JSON-RPC
      - "8547:8547"   # GraphQL
      - "30303:30303" # P2P
    volumes:
      - ./genesis.json:/config/genesis.json:ro
      - besu-data:/data
    command:
      - "--genesis-file=/config/genesis.json"
      - "--data-path=/data"
      - "--node-private-key-file=/data/key"
      - "--rpc-http-enabled=true"
      - "--rpc-http-host=0.0.0.0"
      - "--rpc-http-port=8545"
      - "--rpc-http-cors-origins=*"
      - "--rpc-http-api=ETH,NET,WEB3,CLIQUE,MINER,ADMIN,TXPOOL,DEBUG"
      - "--rpc-ws-enabled=true"
      - "--rpc-ws-host=0.0.0.0"
      - "--rpc-ws-port=8546"
      - "--rpc-ws-api=ETH,NET,WEB3,CLIQUE,MINER,ADMIN,TXPOOL,DEBUG"
      - "--graphql-http-enabled=true"
      - "--graphql-http-host=0.0.0.0"
      - "--graphql-http-port=8547"
      - "--host-allowlist=*"
      - "--miner-enabled=true"
      - "--miner-coinbase=0xa2d51ae1de43abb8c5167ceb0d803a93a61ad246"
      - "--logging=INFO"
    healthcheck:
      test: ["CMD", "curl", "-f", "-X", "POST", "--data", "{\"jsonrpc\":\"2.0\",\"method\":\"eth_blockNumber\",\"params\":[],\"id\":1}", "http://localhost:8545"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  besu-data: